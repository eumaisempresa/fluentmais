<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluent⁺ — EU⁺ Executivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#060E18;--bg2:#0A1624;--bg3:#0E1E30;
            --gold:#C4974A;--gold-sub:rgba(196,151,74,0.18);
            --txt:#EEF0F2;--txt2:#7A8FA3;
            --ok:#52C41A;--warn:#FAAD14;--err:#FF4D4F;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

        /* LOGIN */
        #telaLogin{position:fixed;inset:0;z-index:200;display:flex;justify-content:center;align-items:center;background:var(--bg);padding:20px;}
        .login-card{background:var(--bg2);border:1px solid var(--gold-sub);padding:40px;width:100%;max-width:400px;border-radius:4px;text-align:center;}
        .login-card h2{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:2rem;margin-bottom:6px;}
        .login-card h2 span{font-weight:600;color:var(--gold);font-size:.42em;vertical-align:super;}
        .login-sub{color:var(--txt2);font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:28px;}
        .inp-g{margin-bottom:18px;text-align:left;}
        .inp-g label{display:block;font-size:.78rem;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
        .inp-g input{width:100%;background:var(--bg);border:1px solid var(--gold-sub);padding:12px;color:var(--txt);border-radius:2px;font-family:inherit;font-size:1rem;}
        .inp-g input:focus{outline:none;border-color:var(--gold);}
        .btn-full{width:100%;background:transparent;border:1px solid var(--gold);color:var(--txt);padding:13px;font-family:inherit;font-weight:500;font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:.3s;margin-top:4px;}
        .btn-full:hover:not(:disabled){background:var(--gold);color:var(--bg);}
        .btn-full:disabled{opacity:.5;cursor:default;}
        .login-erro{color:var(--err);font-size:.82rem;margin-top:14px;min-height:1.1em;}

        /* HEADER */
        #appHeader{display:none;background:var(--bg2);border-bottom:1px solid var(--gold-sub);padding:14px 24px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
        .brand-h{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.4rem;}
        .brand-h span{font-weight:600;color:var(--gold);font-size:.42em;vertical-align:super;}
        .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
        .user-label{font-size:.8rem;color:var(--gold);}
        .badge-msgs{font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em;}
        .badge-ok{background:rgba(82,196,26,.15);color:var(--ok);border:1px solid rgba(82,196,26,.3);}
        .badge-warn{background:rgba(250,173,20,.15);color:var(--warn);border:1px solid rgba(250,173,20,.3);}
        .badge-err{background:rgba(255,77,79,.15);color:var(--err);border:1px solid rgba(255,77,79,.3);}
        .btn-sm{background:none;border:1px solid var(--gold-sub);color:var(--txt2);padding:5px 12px;border-radius:2px;cursor:pointer;font-size:.75rem;text-transform:uppercase;}
        .btn-sm:hover{border-color:var(--gold);color:var(--gold);}

        /* MISSÕES */
        #telaMissoes{display:none;flex:1;flex-direction:column;}
        .m-wrap{max-width:960px;width:100%;margin:0 auto;padding:32px 20px;flex:1;}
        .m-titulo{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.8rem;color:var(--gold);margin-bottom:6px;}
        .m-sub{color:var(--txt2);font-size:.88rem;margin-bottom:28px;}
        .filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
        .f-btn{background:transparent;border:1px solid var(--gold-sub);color:var(--txt2);padding:6px 16px;border-radius:2px;cursor:pointer;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;transition:.2s;}
        .f-btn.ativo,.f-btn:hover{border-color:var(--gold);color:var(--gold);}
        .m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
        .m-card{background:var(--bg2);border:1px solid var(--gold-sub);border-radius:4px;padding:24px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;gap:12px;}
        .m-card:hover{border-color:var(--gold);box-shadow:0 8px 24px rgba(196,151,74,.1);transform:translateY(-2px);}
        .m-tags{display:flex;gap:8px;flex-wrap:wrap;}
        .tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:2px;}
        .tA1{background:rgba(82,196,26,.12);color:var(--ok);}
        .tB1{background:rgba(250,173,20,.12);color:var(--warn);}
        .tC1{background:rgba(196,151,74,.18);color:var(--gold);}
        .tcat{background:rgba(122,143,163,.12);color:var(--txt2);}
        .m-titulo-card{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:400;}
        .m-desc{font-size:.85rem;color:var(--txt2);line-height:1.5;}
        .m-cta{font-size:.78rem;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-top:auto;}
        .livre-card{background:var(--bg);border:1px dashed var(--gold-sub);border-radius:4px;padding:24px;cursor:pointer;transition:all .3s;text-align:center;}
        .livre-card:hover{border-color:var(--gold);}
        .livre-card h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.2rem;color:var(--txt2);margin-bottom:6px;}
        .livre-card p{font-size:.82rem;color:var(--txt2);}
        .m-loading{text-align:center;padding:48px;color:var(--txt2);font-style:italic;}

        /* CHAT */
        #telaChat{display:none;flex:1;flex-direction:column;overflow:hidden;}
        .chat-hdr{background:var(--bg2);border-bottom:1px solid var(--gold-sub);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
        .btn-back{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:1.3rem;padding:4px 8px;border-radius:2px;}
        .btn-back:hover{color:var(--gold);}
        .chat-titulo{font-size:.9rem;color:var(--txt);font-weight:500;}
        .chat-label{font-size:.75rem;color:var(--txt2);}
        .chat-msgs{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:18px;}
        .msg{max-width:80%;line-height:1.55;font-size:.98rem;}
        .msg.user{align-self:flex-end;color:var(--gold);text-align:right;}
        .msg.ai{align-self:flex-start;background:var(--bg2);border:1px solid var(--gold-sub);padding:14px 18px;border-radius:4px;}
        .msg.loading{opacity:.55;font-style:italic;}
        .msg.aviso{border-color:var(--err);color:#f0c4c4;}
        .corr-card{align-self:flex-start;background:rgba(196,151,74,.06);border:1px solid rgba(196,151,74,.35);padding:10px 16px;border-radius:4px;font-size:.82rem;color:var(--txt2);max-width:80%;}
        .corr-card strong{color:var(--gold);}
        .fb-card{align-self:flex-start;width:100%;max-width:520px;background:var(--bg2);border:1px solid var(--gold-sub);border-radius:4px;overflow:hidden;}
        .fb-insight{padding:16px 20px;font-size:.88rem;line-height:1.55;border-bottom:1px solid var(--gold-sub);}
        .fb-qhdr{padding:12px 20px 8px;font-size:.78rem;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
        .fb-qq{padding:0 20px 12px;font-size:.9rem;line-height:1.4;}
        .fb-ops{padding:0 20px 16px;display:flex;flex-direction:column;gap:8px;}
        .qbtn{background:var(--bg);border:1px solid var(--gold-sub);color:var(--txt);padding:9px 14px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:.85rem;text-align:left;transition:.2s;}
        .qbtn:hover{border-color:var(--gold);}
        .qbtn.certo{background:rgba(82,196,26,.12);border-color:var(--ok);color:var(--ok);cursor:default;}
        .qbtn.errado{background:rgba(255,77,79,.08);border-color:var(--err);color:var(--err);cursor:default;}
        .chat-input{border-top:1px solid var(--gold-sub);background:var(--bg2);padding:14px 20px;display:flex;gap:12px;align-items:center;flex-shrink:0;}
        .chat-input input{flex:1;background:var(--bg);border:1px solid var(--gold-sub);padding:11px 14px;color:var(--txt);font-family:inherit;font-size:.95rem;border-radius:2px;}
        .chat-input input:focus{outline:none;border-color:var(--gold);}
        .chat-input input:disabled{opacity:.5;}
        .btn-mic{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:10px 16px;cursor:pointer;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;border-radius:2px;white-space:nowrap;transition:.3s;}
        .btn-mic.rec{background:var(--err);border-color:var(--err);color:#fff;}
        .btn-mic:disabled{opacity:.5;cursor:default;}

        footer{border-top:1px solid var(--gold-sub);padding:16px 20px;text-align:center;font-size:.75rem;color:var(--txt2);flex-shrink:0;}
        footer a{color:var(--txt2);text-decoration:none;}
        @media(max-width:600px){.m-grid{grid-template-columns:1fr;}.msg{max-width:92%;}.fb-card{max-width:92%;}}
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-card">
        <h2>Fluent<span>⁺</span></h2>
        <div class="login-sub">EU⁺ Executivo — Identificação</div>
        <div class="inp-g"><label>E-mail</label><input type="email" id="loginEmail" autocomplete="off"></div>
        <div class="inp-g"><label>Senha (EXECxxxx)</label><input type="password" id="loginSenha"></div>
        <button class="btn-full" id="btnLogin" onclick="autenticar()">Acessar</button>
        <div class="login-erro" id="loginErro"></div>
    </div>
</div>

<header id="appHeader">
    <div class="brand-h">Fluent<span>⁺</span></div>
    <div class="header-right">
        <span class="user-label" id="lblUsuario"></span>
        <span class="badge-msgs badge-ok" id="badgeMsgs"></span>
        <button class="btn-sm" onclick="sair()">Sair</button>
    </div>
</header>

<div id="telaMissoes">
    <div class="m-wrap">
        <div class="m-titulo">Suas Missões</div>
        <div class="m-sub" id="mSub">Escolha um cenário para treinar.</div>
        <div class="filtros" id="filtros"></div>
        <div class="m-grid" id="grid"><div class="m-loading">Carregando missões...</div></div>
    </div>
</div>

<div id="telaChat">
    <div class="chat-hdr">
        <button class="btn-back" onclick="voltarMissoes()">←</button>
        <div>
            <div class="chat-titulo" id="chatTitulo">Chat</div>
            <div class="chat-label" id="chatLabel"></div>
        </div>
    </div>
    <div class="chat-msgs" id="chatBox"></div>
    <div class="chat-input">
        <input type="text" id="txtInput" placeholder="Digite em inglês ou use o microfone...">
        <button class="btn-mic" id="btnMic">🎤 Voz</button>
    </div>
</div>

<footer>
    <a href="https://www.eumaisempresa.com.br" target="_blank">Grupo EU⁺</a> &gt;
    Fluent<span style="font-size:.7em;vertical-align:super;">⁺</span>
</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbwJ4V37D57Q-wUUBvfPncAK5XqRjN119zWz5O-hwvAYNUgAbAROlWN2Uw2QVwTztjY/exec";
let S = {email:"",aba:"",plano:"",nome:"",restantes:0,idMissao:null};
let hist = [];

async function apiPost(p){const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});return r.json();}
async function apiGet(p){const q=Object.entries(p).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");const r=await fetch(`${API}?${q}`);return r.json();}

function badge(n){
    const el=document.getElementById("badgeMsgs");
    if(S.plano==="Free"){el.className="badge-msgs badge-err";el.textContent="Plano Free";return;}
    el.textContent=n+" msgs restantes";
    el.className="badge-msgs "+(n>10?"badge-ok":n>3?"badge-warn":"badge-err");
}

window.addEventListener("DOMContentLoaded",()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("email"))document.getElementById("loginEmail").value=decodeURIComponent(p.get("email"));
});

async function autenticar(){
    const email=document.getElementById("loginEmail").value.trim();
    const senha=document.getElementById("loginSenha").value.trim();
    const btn=document.getElementById("btnLogin"),err=document.getElementById("loginErro");
    err.textContent="";
    if(!email||!senha){err.textContent="Preencha todos os campos.";return;}
    btn.disabled=true;btn.textContent="VERIFICANDO...";
    try{
        const r=await apiPost({acao:"validar_login",dados:{email,senha}});
        if(r.status==="sucesso"){
            if(r.acesso_expirado){err.textContent="Acesso expirado. Entre em contato.";btn.disabled=false;btn.textContent="ACESSAR";return;}
            S={email:r.email,aba:r.aba,plano:r.plano,nome:r.nome,restantes:r.mensagens_restantes,idMissao:null};
            document.getElementById("lblUsuario").textContent=r.nome||r.email;
            badge(r.mensagens_restantes);
            document.getElementById("telaLogin").style.display="none";
            document.getElementById("appHeader").style.display="flex";
            carregarMissoes();
        }else{err.textContent=r.message||"Credenciais incorretas.";btn.disabled=false;btn.textContent="ACESSAR";}
    }catch{err.textContent="Falha de conexão.";btn.disabled=false;btn.textContent="ACESSAR";}
}

function sair(){sessionStorage.clear();location.reload();}

let missoesList=[];
async function carregarMissoes(){
    document.getElementById("telaMissoes").style.display="flex";
    document.getElementById("telaChat").style.display="none";
    S.idMissao=null;
    const subs={"Free":"Plano Free: acesse insights e quizzes. Faça upgrade para conversas com IA.","Premium Trial":"Período trial ativo. Escolha uma missão.","Básico":"Missões + Chat Livre disponíveis.","Premium":"Acesso completo.","Exclusive Enterprise":"Acesso Enterprise ativado."};
    document.getElementById("mSub").textContent=subs[S.plano]||"";
    if(missoesList.length){renderMissoes(missoesList);return;}
    try{
        const r=await apiGet({acao:"buscar_missoes"});
        if(r.status==="sucesso"){missoesList=r.missoes;renderMissoes(missoesList);}
        else document.getElementById("grid").innerHTML="<p style='color:var(--err)'>Erro ao carregar missões.</p>";
    }catch{document.getElementById("grid").innerHTML="<p style='color:var(--err)'>Falha de conexão.</p>";}
}

function renderMissoes(lista){
    const cats=[...new Set(lista.map(m=>m.categoria))];
    const fEl=document.getElementById("filtros");fEl.innerHTML="";
    function mkFiltro(lbl,fn){const b=document.createElement("button");b.className="f-btn";b.textContent=lbl;b.onclick=()=>{document.querySelectorAll(".f-btn").forEach(x=>x.classList.remove("ativo"));b.classList.add("ativo");fn();};return b;}
    const t=mkFiltro("Todas",()=>renderCards(lista));t.classList.add("ativo");fEl.appendChild(t);
    cats.forEach(c=>fEl.appendChild(mkFiltro(c,()=>renderCards(lista.filter(m=>m.categoria===c)))));
    renderCards(lista);
}

function renderCards(lista){
    const g=document.getElementById("grid");g.innerHTML="";
    lista.forEach(m=>{
        const d=document.createElement("div");d.className="m-card";
        d.innerHTML=`<div class="m-tags"><span class="tag t${m.nivel}">${m.nivel}</span><span class="tag tcat">${m.categoria}</span></div><div class="m-titulo-card">${m.titulo}</div><div class="m-desc">${m.descricao}</div><div class="m-cta">Iniciar missão →</div>`;
        d.onclick=()=>iniciarMissao(m);g.appendChild(d);
    });
    if(["Básico","Premium","Exclusive Enterprise"].includes(S.plano)){
        const l=document.createElement("div");l.className="livre-card";
        l.innerHTML="<h3>Chat Livre</h3><p>Fale sobre qualquer tema executivo sem roteiro.</p>";
        l.onclick=iniciarLivre;g.appendChild(l);
    }
}

function abrirChat(){document.getElementById("telaMissoes").style.display="none";document.getElementById("telaChat").style.display="flex";document.getElementById("chatBox").innerHTML="";document.getElementById("txtInput").focus();}
function voltarMissoes(){carregarMissoes();}

function iniciarMissao(m){
    S.idMissao=m.id;
    document.getElementById("chatTitulo").textContent=m.titulo;
    document.getElementById("chatLabel").textContent=m.categoria+" · "+m.nivel;
    hist=[];sessionStorage.setItem("fluent_hist",JSON.stringify(hist));
    abrirChat();
    addAI(m.pergunta_gatilho||"Let's begin. Ready when you are.",false);
}

function iniciarLivre(){
    S.idMissao=null;
    document.getElementById("chatTitulo").textContent="Chat Livre";
    document.getElementById("chatLabel").textContent="Qualquer tema executivo";
    try{hist=JSON.parse(sessionStorage.getItem("fluent_hist")||"[]");}catch{hist=[];}
    abrirChat();
    hist.forEach(h=>h.tipo==="user"?addUser(h.texto,false):addAI(h.texto,false));
    if(!hist.length)addAI("Welcome. What would you like to explore today?",false);
}

function addUser(t,s=true){const d=mk("msg user",t);box().appendChild(d);roll();if(s){hist.push({tipo:"user",texto:t});save();}}
function addAI(t,s=true,extra=""){const d=mk("msg ai",t);if(extra)d.className+=" "+extra;box().appendChild(d);roll();if(s){hist.push({tipo:"ai",texto:t});save();}return d;}
function addCorr(t,c){if(!t)return;const d=mk("corr-card",`💡 <strong>Correction:</strong> "${t}" → <strong style="color:var(--ok)">"${c}"</strong>`);d.innerHTML=d.textContent;d.innerHTML=`💡 <strong>Correction:</strong> "${t}" → <strong style="color:var(--ok)">"${c}"</strong>`;box().appendChild(d);roll();}
function addLoad(){const d=mk("msg ai loading","Fluent⁺ está respondendo...");box().appendChild(d);roll();return d;}
function addFB(fb){
    const c=document.createElement("div");c.className="fb-card";
    let h="";
    if(fb.insight)h+=`<div class="fb-insight">${fb.insight}</div>`;
    if(fb.quiz_pergunta){
        h+=`<div class="fb-qhdr">🧠 Desafio Relâmpago</div><div class="fb-qq">${fb.quiz_pergunta}</div><div class="fb-ops">`;
        [["A",fb.quiz_a],["B",fb.quiz_b],["C",fb.quiz_c]].forEach(([l,v])=>{if(v)h+=`<button class="qbtn" data-l="${l}" data-r="${fb.quiz_resposta}">${l}) ${v}</button>`;});
        h+="</div>";
    }
    c.innerHTML=h;
    c.querySelectorAll(".qbtn").forEach(b=>b.addEventListener("click",function(){c.querySelectorAll(".qbtn").forEach(x=>{x.disabled=true;x.classList.add(x.dataset.l===x.dataset.r?"certo":"errado");});}));
    box().appendChild(c);roll();
}
function mk(cls,txt){const d=document.createElement("div");d.className=cls;d.textContent=txt;return d;}
function box(){return document.getElementById("chatBox");}
function roll(){const b=box();b.scrollTop=b.scrollHeight;}
function save(){sessionStorage.setItem("fluent_hist",JSON.stringify(hist));}
function lock(v){document.getElementById("txtInput").disabled=v;document.getElementById("btnMic").disabled=v;}

document.getElementById("txtInput").addEventListener("keypress",e=>{if(e.key==="Enter"&&!e.target.disabled&&e.target.value.trim()){const t=e.target.value.trim();e.target.value="";enviar(t,"Texto");}});

async function enviar(texto,canal){
    addUser(texto);lock(true);const ld=addLoad();
    try{
        const r=await apiPost({acao:S.idMissao?"processar_missao":"processar_interacao",id_missao:S.idMissao||null,dados:{email:S.email,nome_aba:S.aba,input_texto:texto,canal}});
        ld.remove();
        if(r.status==="sucesso"){addAI(r.reply);if(r.error_logged&&r.termo_corrigido)addCorr(r.termo_corrigido,r.correcao);badge(r.mensagens_restantes);}
        else if(r.status==="fallback"){if(r.fallback)addFB(r.fallback);badge(r.mensagens_restantes??S.restantes);}
        else if(r.status==="bloqueado"){addAI(r.reply,"",aviso);badge(0);if(r.fallback)addFB(r.fallback);}
        else{const d=mk("msg ai aviso",r.message||r.reply||"Erro inesperado.");box().appendChild(d);}
    }catch{ld.remove();const d=mk("msg ai aviso","Falha de conexão. Tente novamente.");box().appendChild(d);}
    finally{lock(false);roll();document.getElementById("txtInput").focus();}
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec,recA=false;const bm=document.getElementById("btnMic");
if(SR){rec=new SR();rec.lang="en-US";rec.continuous=false;
    rec.onstart=()=>{bm.textContent="⏹ Parar";bm.classList.add("rec");};
    rec.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById("txtInput").value=t;enviar(t,"Voz");};
    rec.onend=()=>{bm.textContent="🎤 Voz";bm.classList.remove("rec");recA=false;};
    bm.addEventListener("click",()=>{if(!recA){rec.start();recA=true;}else rec.stop();});
}else{bm.textContent="Voz indisponível";bm.disabled=true;}
</script>
</body>
</html>
